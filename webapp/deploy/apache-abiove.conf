# ABIOVE LULC Webapp — add these lines inside your existing VirtualHost block
# in /etc/apache2/sites-enabled/your-site.conf
#
# Enable required modules first (run once):
#   sudo a2enmod proxy proxy_http
#   sudo systemctl reload apache2

ProxyPreserveHost On
ProxyPass        /abiove/ http://127.0.0.1:8001/
ProxyPassReverse /abiove/ http://127.0.0.1:8001/
