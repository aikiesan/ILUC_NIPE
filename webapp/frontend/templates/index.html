<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABIOVE LULC 2026 | NIPE/UNICAMP</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header>
    <div class="header-title">
      <span class="header-main">ABIOVE LULC 2026</span>
      <span class="header-sub">NIPE / UNICAMP</span>
    </div>
    <div id="region-badge" class="region-badge hidden">
      <span id="badge-name"></span>
      <span id="badge-biome" class="badge-tag"></span>
      <span id="badge-uf" class="badge-tag"></span>
      <a id="report-link" class="report-btn hidden" target="_blank" rel="noopener">Relatório ↗</a>
    </div>
  </header>

  <main>
    <section class="panel-map">
      <div id="map"></div>
    </section>

    <section class="panel-dashboard">
      <div id="welcome" class="welcome-msg">
        <p>Clique em uma região no mapa para visualizar a série temporal de uso do solo.</p>
        <p class="welcome-hint">Regiões marcadas com ★ são os padrões-ouro de validação.</p>
      </div>

      <div id="dashboard-content" class="hidden">
        <div id="class-tabs" class="tab-bar"></div>
        <div id="chart"></div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/map.js"></script>
</body>
</html>
